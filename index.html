<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Juegos</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Schoolbell&family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { width:100%; height:100%; overflow:hidden; }

  .hub {
    width:100%; height:100vh; height:100dvh;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
  }

  .section {
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; position:relative; overflow:hidden;
    text-decoration:none;
    transition:filter 0.4s ease;
  }
  .section:hover { filter:brightness(1.18); }

  .text-block {
    display:flex; flex-direction:column;
    align-items:center; text-align:center;
    position:relative; z-index:2;
  }

  .arrow {
    position:absolute; right:22px; bottom:20px;
    opacity:0; transition:opacity 0.3s ease, transform 0.3s ease;
    z-index:2;
  }
  .section:hover .arrow { opacity:1; transform:translate(4px,-4px); }

  .flash-overlay {
    position:fixed; inset:0;
    pointer-events:none; z-index:999; opacity:0;
  }

  /* ══ HIDDEN CODES — arriba izquierda ══ */
  .hidden-codes {
    background:#020b18;
    border-right:2px solid #00ffe7;
    border-bottom:2px solid #00ffe7;
  }
  .hidden-codes .grid-bg {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(0,255,231,0.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,231,0.06) 1px,transparent 1px);
    background-size:40px 40px;
  }
  .hidden-codes:hover .grid-bg {
    background-image:
      linear-gradient(rgba(0,255,231,0.13) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,231,0.13) 1px,transparent 1px);
  }
  .hidden-codes .scanline {
    position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px);
    pointer-events:none;
  }
  .scan-sweep {
    position:absolute; left:0; right:0; height:3px;
    background:linear-gradient(90deg,transparent,#00ffe7,transparent);
    box-shadow:0 0 18px 4px rgba(0,255,231,0.5);
    animation:sweep 4s linear infinite; opacity:0.7;
  }
  @keyframes sweep{0%{top:-4px}100%{top:100%}}
  .hidden-codes .glow-ring {
    position:absolute; width:180px; height:180px; border-radius:50%;
    border:1px solid rgba(0,255,231,0.18);
    box-shadow:0 0 50px rgba(0,255,231,0.08);
    animation:pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.08);opacity:1}}
  .hc-ambient {
    position:absolute; font-family:'Share Tech Mono',monospace;
    font-size:10px; letter-spacing:3px;
    color:rgba(0,255,231,0.13); user-select:none; cursor:default;
  }
  .hidden-codes .title {
    font-family:'Orbitron',monospace;
    font-size:clamp(15px,2.2vw,36px);
    font-weight:900; color:#00ffe7;
    text-shadow:0 0 20px #00ffe7,0 0 50px rgba(0,255,231,0.4);
    letter-spacing:0.3em;
  }
  .hidden-codes .subtitle {
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(7px,0.85vw,12px);
    color:rgba(0,255,231,0.45); letter-spacing:0.4em; margin-top:10px;
  }
  .cursor{animation:blink 1s step-end infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .hidden-codes .arrow{font-family:'Share Tech Mono',monospace;font-size:18px;color:#00ffe7;text-shadow:0 0 10px #00ffe7}

  /* ══ LETRARIO — arriba derecha ══ */
  .letrario{background:#140800;border-bottom:2px solid #5c1010;}
  .letrario .parchment{
    position:absolute;inset:0;
    background:radial-gradient(ellipse at 15% 50%,rgba(139,26,26,0.2) 0%,transparent 55%),
               radial-gradient(ellipse at 85% 50%,rgba(180,120,0,0.12) 0%,transparent 55%);
  }
  .letrario:hover .parchment{
    background:radial-gradient(ellipse at 15% 50%,rgba(139,26,26,0.38) 0%,transparent 55%),
               radial-gradient(ellipse at 85% 50%,rgba(180,120,0,0.25) 0%,transparent 55%);
  }
  .letrario .runes{position:absolute;font-size:18px;letter-spacing:8px;color:rgba(212,175,55,0.1);user-select:none}
  .letrario .ornament{position:absolute;top:50%;transform:translateY(-50%);font-size:14px;letter-spacing:5px;color:rgba(139,26,26,0.35);user-select:none}
  .letrario .title{
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(18px,2.8vw,46px);
    font-weight:900;color:#d4af37;
    text-shadow:0 0 30px rgba(212,175,55,0.45),2px 2px 6px #000;
    letter-spacing:0.1em;animation:flicker 6s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1;text-shadow:0 0 30px rgba(212,175,55,0.45),2px 2px 6px #000}
    92%{opacity:1;text-shadow:0 0 30px rgba(212,175,55,0.45),2px 2px 6px #000}
    93%{opacity:0.6;text-shadow:0 0 10px rgba(212,175,55,0.2)}
    94%{opacity:1;text-shadow:0 0 30px rgba(212,175,55,0.45),2px 2px 6px #000}
    96%{opacity:0.75;text-shadow:0 0 15px rgba(212,175,55,0.3)}
    97%{opacity:1;text-shadow:0 0 30px rgba(212,175,55,0.45),2px 2px 6px #000}
  }
  .letrario .subtitle{font-family:'Cinzel Decorative',serif;font-size:clamp(7px,0.75vw,10px);color:rgba(212,175,55,0.4);letter-spacing:0.3em;margin-top:8px}
  .letrario .arrow{font-size:22px;color:#d4af37}
  .particle{position:absolute;width:3px;height:3px;border-radius:50%;background:#d4af37;pointer-events:none;user-select:none;animation:float-particle linear infinite;opacity:0}
  @keyframes float-particle{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:0.7}90%{opacity:0.4}100%{transform:translateY(-80px) translateX(var(--dx));opacity:0}}

  /* ══ FORMAS — abajo izquierda ══ */
  .formas{background:#f2ece0;border-right:2px solid rgba(44,44,110,0.25);}
  .formas .paper-lines{
    position:absolute;inset:0;
    background-image:repeating-linear-gradient(transparent,transparent 28px,rgba(44,44,110,0.06) 28px,rgba(44,44,110,0.06) 29px);
  }
  .formas:hover{background:#ede5d0;filter:brightness(1)}
  .shape-deco{position:absolute;opacity:0.1}
  .rot-slow{animation:rotate-slow 30s linear infinite;transform-origin:center}
  .rot-slow-r{animation:rotate-slow-r 25s linear infinite;transform-origin:center}
  @keyframes rotate-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes rotate-slow-r{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
  .formas .title{
    font-family:'Schoolbell',cursive;
    font-size:clamp(18px,2.8vw,44px);
    color:#2c2c6e;letter-spacing:0.05em;white-space:nowrap;
    border-right:3px solid #2c2c6e;
    animation:cursor-blink 0.8s step-end infinite;min-width:1px;
  }
  @keyframes cursor-blink{0%,100%{border-color:#2c2c6e}50%{border-color:transparent}}
  .formas .subtitle{font-family:'Schoolbell',cursive;font-size:clamp(7px,0.85vw,12px);color:rgba(44,44,110,0.4);letter-spacing:0.25em;margin-top:8px;opacity:0;transition:opacity 0.5s ease}
  .formas .arrow{font-size:20px;color:#2c2c6e}

  /* ══ NEXOS — abajo derecha ══ */
  .nexos{background:#1a1a2e}
  .nexos::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 20% 50%,rgba(107,70,193,0.2) 0%,transparent 55%),
               radial-gradient(ellipse at 80% 50%,rgba(49,130,206,0.15) 0%,transparent 55%);
    transition:opacity 0.4s;
  }
  .nexos:hover::before{
    background:radial-gradient(ellipse at 20% 50%,rgba(107,70,193,0.35) 0%,transparent 55%),
               radial-gradient(ellipse at 80% 50%,rgba(49,130,206,0.28) 0%,transparent 55%);
  }
  .nx-letter-grid{position:absolute;display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  .nx-cell{
    width:40px;height:40px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;
    color:#e2e8f0;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
    transition:all 0.4s ease;animation:cell-in 0.4s ease backwards;
  }
  .nx-cell.nexos-letter{background:rgba(107,70,193,0.3);border-color:rgba(107,70,193,0.6);color:#fff}
  .nx-cell.fade-out{animation:cell-fade 0.5s ease forwards}
  @keyframes cell-fade{to{opacity:0;transform:scale(0.7)}}
  @keyframes cell-in{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
  .nx-cell:nth-child(1){animation-delay:.05s}.nx-cell:nth-child(2){animation-delay:.08s}
  .nx-cell:nth-child(3){animation-delay:.11s}.nx-cell:nth-child(4){animation-delay:.14s}
  .nx-cell:nth-child(5){animation-delay:.17s}.nx-cell:nth-child(6){animation-delay:.20s}
  .nx-cell:nth-child(7){animation-delay:.23s}.nx-cell:nth-child(8){animation-delay:.26s}
  .nx-cell:nth-child(9){animation-delay:.29s}.nx-cell:nth-child(10){animation-delay:.32s}
  .nx-cell:nth-child(11){animation-delay:.35s}.nx-cell:nth-child(12){animation-delay:.38s}
  .nx-cell:nth-child(13){animation-delay:.41s}.nx-cell:nth-child(14){animation-delay:.44s}
  .nx-cell:nth-child(15){animation-delay:.47s}.nx-cell:nth-child(16){animation-delay:.50s}
  .nx-cell:nth-child(17){animation-delay:.53s}.nx-cell:nth-child(18){animation-delay:.56s}

  .nx-title-block{position:relative;z-index:10;text-align:center;opacity:0;transform:scale(0.85);transition:opacity 0.6s ease,transform 0.6s ease;pointer-events:none}
  .nx-title-block.show{opacity:1;transform:scale(1);pointer-events:auto}
  .nexos .title{font-family:'Playfair Display',serif;font-size:clamp(20px,3vw,50px);font-weight:700;color:#fff;letter-spacing:0.15em;text-shadow:0 2px 20px rgba(107,70,193,0.6)}
  .nx-dots{display:flex;gap:8px;justify-content:center;margin-top:12px;opacity:0;animation:dots-in 0.5s ease forwards;animation-play-state:paused}
  .nx-title-block.show .nx-dots{animation-play-state:running}
  @keyframes dots-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .nx-dot{width:12px;height:12px;border-radius:3px}
  .nexos .subtitle{font-family:'Playfair Display',serif;font-size:clamp(7px,0.75vw,11px);color:rgba(255,255,255,0.3);letter-spacing:0.35em;margin-top:10px;opacity:0;transition:opacity 0.5s ease 0.3s}
  .nx-title-block.show .subtitle{opacity:1}
  .nexos .arrow{font-size:20px;color:rgba(200,150,255,0.8)}

  .spark{position:absolute;width:6px;height:6px;border-radius:50%;pointer-events:none;animation:spark-anim 0.6s ease forwards}
  @keyframes spark-anim{0%{transform:scale(1);opacity:1}100%{transform:scale(0) translate(var(--sx),var(--sy));opacity:0}}
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="hub">

  <!-- HIDDEN CODES -->
  <a class="section hidden-codes" id="link-hc" href="https://is.gd/M4ryS0L" target="_blank">
    <div class="grid-bg"></div>
    <div class="scanline"></div>
    <div class="scan-sweep"></div>
    <div class="glow-ring"></div>
    <div class="hc-ambient" id="amb1" style="top:18%;left:4%">7 · 3 · 1 · 9 · 4 · 2</div>
    <div class="hc-ambient" id="amb2" style="top:65%;left:3%">■ □ ■ □ □ ■ □ ■</div>
    <div class="hc-ambient" id="amb3" style="top:22%;right:5%">0x4F · 0xA2 · 0x11</div>
    <div class="hc-ambient" id="amb4" style="bottom:18%;right:4%">≠ ≡ ∅ ∞ ≥</div>
    <div class="text-block">
      <div class="title">HIDDEN CODES<span class="cursor">_</span></div>

  <!-- LETRARIO -->
  <a class="section letrario" id="link-lt" href="https://is.gd/Letrario" target="_blank">
    <div class="parchment"></div>
    <div class="runes" style="top:12%;left:3%">ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ</div>

    <div class="ornament" style="left:6%">✦ ✧ ✦</div>
    <div class="ornament" style="right:6%">✦ ✧ ✦</div>
    <div id="particles-container"></div>
    <div class="text-block">
      <div class="title">Letrario</div>
      <div class="subtitle">CONJURA · DESCIFRA · INVOCA</div>
    </div>
    <div class="arrow">⟩</div>
  </a>

  <!-- FORMAS -->
  <a class="section formas" id="link-fm" href="https://is.gd/Shapes" target="_blank">
    <div class="paper-lines"></div>
    <svg class="shape-deco rot-slow"   style="left:5%;top:8%;width:80px;height:80px"   viewBox="0 0 90 90"><circle cx="45" cy="45" r="38" fill="none" stroke="#e05a2b" stroke-width="4"/></svg>
    <svg class="shape-deco rot-slow-r" style="right:7%;top:6%;width:80px;height:80px"  viewBox="0 0 90 90"><polygon points="45,6 84,78 6,78" fill="none" stroke="#2c2c6e" stroke-width="4"/></svg>
    <svg class="shape-deco rot-slow"   style="left:9%;bottom:8%;width:64px;height:64px" viewBox="0 0 70 70"><rect x="5" y="5" width="60" height="60" fill="none" stroke="#2a9e4f" stroke-width="4"/></svg>
    <svg class="shape-deco rot-slow-r" style="right:5%;bottom:10%;width:46px;height:46px" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="#e05a2b"/></svg>
    <div class="text-block">
      <div class="title" id="formas-title"></div>
      <div class="subtitle">OBSERVA · COLOCA · RESUELVE</div>
    </div>
    <div class="arrow">→</div>
  </a>

  <!-- NEXOS -->
  <a class="section nexos" id="link-nx" href="https://is.gd/NEXOS" target="_blank">
    <div class="nx-letter-grid" id="nxGrid">
      <div class="nx-cell">R</div>
      <div class="nx-cell nexos-letter" id="cN">N</div>
      <div class="nx-cell">A</div>
      <div class="nx-cell">P</div>
      <div class="nx-cell nexos-letter" id="cE">E</div>
      <div class="nx-cell">T</div>
      <div class="nx-cell">I</div>
      <div class="nx-cell">C</div>
      <div class="nx-cell nexos-letter" id="cX">X</div>
      <div class="nx-cell">M</div>
      <div class="nx-cell">L</div>
      <div class="nx-cell nexos-letter" id="cO">O</div>
      <div class="nx-cell">V</div>
      <div class="nx-cell">D</div>
      <div class="nx-cell">U</div>
      <div class="nx-cell nexos-letter" id="cS">S</div>
      <div class="nx-cell">B</div>
      <div class="nx-cell">F</div>
    </div>
    <div class="nx-title-block" id="nxTitleBlock">
      <div class="title">NEXOS</div>
      <div class="nx-dots">
        <div class="nx-dot" style="background:#F6C90E"></div>
        <div class="nx-dot" style="background:#4CAF7D"></div>
        <div class="nx-dot" style="background:#4A90D9"></div>
        <div class="nx-dot" style="background:#9B59B6"></div>
      </div>
      <div class="subtitle">CONECTA · AGRUPA · DESCUBRE</div>

</div>

<script>
  // ── AUDIO ──────────────────────────────────────────────────────────
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx = null;
  function getCtx(){ if(!ctx) ctx=new AudioCtx(); return ctx; }

  function playHiddenCodesSound(){
    const c=getCtx(),osc=c.createOscillator(),gain=c.createGain();
    osc.connect(gain);gain.connect(c.destination);osc.type='square';
    osc.frequency.setValueAtTime(880,c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1400,c.currentTime+0.12);
    gain.gain.setValueAtTime(0.08,c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.18);
    osc.start();osc.stop(c.currentTime+0.18);
  }
  function playLetrarioSound(){
    const c=getCtx();
    [261,329,392,523].forEach((f,i)=>{
      const osc=c.createOscillator(),gain=c.createGain();
      osc.connect(gain);gain.connect(c.destination);osc.type='sine';osc.frequency.value=f;
      const t=c.currentTime+i*0.07;
      gain.gain.setValueAtTime(0.07,t);gain.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
      osc.start(t);osc.stop(t+0.25);
    });
  }
  function playFormasSound(){
    const c=getCtx(),osc=c.createOscillator(),gain=c.createGain();
    osc.connect(gain);gain.connect(c.destination);osc.type='sine';
    osc.frequency.setValueAtTime(523,c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(659,c.currentTime+0.15);
    gain.gain.setValueAtTime(0.07,c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.2);
    osc.start();osc.stop(c.currentTime+0.2);
  }
  function playNexosSound(){
    const c=getCtx();
    [392,494,587,740].forEach((f,i)=>{
      const osc=c.createOscillator(),gain=c.createGain();
      osc.connect(gain);gain.connect(c.destination);osc.type='sine';osc.frequency.value=f;
      const t=c.currentTime+i*0.06;
      gain.gain.setValueAtTime(0.06,t);gain.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
      osc.start(t);osc.stop(t+0.22);
    });
  }

  document.getElementById('link-hc').addEventListener('mouseenter',playHiddenCodesSound);
  document.getElementById('link-lt').addEventListener('mouseenter',playLetrarioSound);
  document.getElementById('link-fm').addEventListener('mouseenter',playFormasSound);
  document.getElementById('link-nx').addEventListener('mouseenter',playNexosSound);

  // ── FLASH CLICK ────────────────────────────────────────────────────
  function flashAndGo(e,color,url){
    e.preventDefault();
    const ov=document.getElementById('flashOverlay');
    ov.style.background=color;ov.style.transition='opacity 0.15s ease';ov.style.opacity='1';
    setTimeout(()=>{ov.style.transition='opacity 0.3s ease';ov.style.opacity='0';window.open(url,'_blank');},180);
  }
  document.getElementById('link-hc').addEventListener('click',e=>flashAndGo(e,'rgba(0,255,231,0.25)','https://is.gd/M4ryS0L'));
  document.getElementById('link-lt').addEventListener('click',e=>flashAndGo(e,'rgba(212,175,55,0.2)','https://is.gd/Letrario'));
  document.getElementById('link-fm').addEventListener('click',e=>flashAndGo(e,'rgba(44,44,110,0.15)','https://is.gd/Shapes'));
  document.getElementById('link-nx').addEventListener('click',e=>flashAndGo(e,'rgba(107,70,193,0.25)','https://is.gd/NEXOS'));

  // ── FORMAS: typo ───────────────────────────────────────────────────
  const formasTitle=document.getElementById('formas-title');
  const formasSubtitle=formasTitle.nextElementSibling;
  const sequence=[
    {type:'write',text:'F',delay:400},{type:'write',text:'o',delay:150},
    {type:'write',text:'t',delay:140},{type:'write',text:'m',delay:130},
    {type:'write',text:'a',delay:120},{type:'write',text:'s',delay:120},
    {type:'pause',delay:600},
    {type:'delete',delay:100},{type:'delete',delay:100},{type:'delete',delay:100},{type:'delete',delay:110},
    {type:'pause',delay:200},
    {type:'write',text:'r',delay:130},{type:'write',text:'m',delay:120},{type:'write',text:'a',delay:120},{type:'write',text:'s',delay:120},
    {type:'subtitle',delay:400},
  ];
  let current='',si=0;
  function runSequence(){
    if(si>=sequence.length) return;
    const step=sequence[si++];
    setTimeout(()=>{
      if(step.type==='write'){current+=step.text;formasTitle.textContent=current;}
      else if(step.type==='delete'){current=current.slice(0,-1);formasTitle.textContent=current;}
      else if(step.type==='subtitle'){formasSubtitle.style.opacity='1';}
      runSequence();
    },step.delay);
  }
  runSequence();

  // ── HIDDEN CODES: números cambiantes ──────────────────────────────
  const digits='0123456789ABCDEF';
  const symbols=['■','□','▪','▫','◆','◇'];
  const ambients=[
    {el:document.getElementById('amb1'),base:()=>Array.from({length:6},()=>Math.floor(Math.random()*10)).join(' · ')},
    {el:document.getElementById('amb2'),base:()=>Array.from({length:8},()=>symbols[Math.floor(Math.random()*symbols.length)]).join(' ')},
    {el:document.getElementById('amb3'),base:()=>['','',''].map(()=>'0x'+digits[Math.floor(Math.random()*16)]+digits[Math.floor(Math.random()*16)]).join(' · ')},
    {el:document.getElementById('amb4'),base:()=>['≠','≡','∅','∞','≥','≤','∑','∆'][Math.floor(Math.random()*8)]+' '+['≠','≡','∅','∞','≥','≤'][Math.floor(Math.random()*6)]+' '+['∅','∞','≥'][Math.floor(Math.random()*3)]},
  ];
  setInterval(()=>ambients.forEach(a=>{if(Math.random()<0.4) a.el.textContent=a.base();}),1200);

  // ── LETRARIO: partículas ──────────────────────────────────────────
  const pc=document.getElementById('particles-container');
  function spawnParticle(){
    const p=document.createElement('div'); p.className='particle';
    const size=2+Math.random()*3;
    p.style.width=size+'px';p.style.height=size+'px';
    p.style.left=(5+Math.random()*90)+'%';p.style.bottom=(Math.random()*60)+'%';
    p.style.setProperty('--dx',(Math.random()*40-20)+'px');
    const dur=3+Math.random()*4;
    p.style.animationDuration=dur+'s';p.style.animationDelay='0s';
    pc.appendChild(p);setTimeout(()=>p.remove(),dur*1000);
  }
  setInterval(spawnParticle,400);
  for(let i=0;i<8;i++) setTimeout(spawnParticle,i*200);

  // ── NEXOS: animación letras ───────────────────────────────────────
  const style=document.createElement('style');
  style.textContent=`@keyframes fly-nx{to{transform:translate(var(--tx),var(--ty)) scale(1.3);opacity:0}}`;
  document.head.appendChild(style);

  function runNexosAnimation(){
    const grid=document.getElementById('nxGrid');
    const titleBlock=document.getElementById('nxTitleBlock');
    const allCells=Array.from(grid.querySelectorAll('.nx-cell'));
    const nexosCells=Array.from(grid.querySelectorAll('.nexos-letter'));
    const otherCells=allCells.filter(c=>!c.classList.contains('nexos-letter'));

    setTimeout(()=>{
      nexosCells.forEach(c=>{
        c.style.background='rgba(107,70,193,0.55)';
        c.style.borderColor='rgba(200,150,255,0.9)';
        c.style.boxShadow='0 0 16px rgba(160,100,255,0.6)';
        c.style.transform='scale(1.12)';
        c.style.transition='all 0.35s ease';
      });
    },1200);

    setTimeout(()=>otherCells.forEach(c=>c.classList.add('fade-out')),1700);

    setTimeout(()=>{
      const section=document.getElementById('link-nx');
      const sRect=section.getBoundingClientRect();
      const cx=sRect.left+sRect.width/2, cy=sRect.top+sRect.height/2;
      nexosCells.forEach(c=>{
        const r=c.getBoundingClientRect();
        c.style.setProperty('--tx',(cx-(r.left+r.width/2))+'px');
        c.style.setProperty('--ty',(cy-(r.top+r.height/2))+'px');
        c.style.transition='none';
        c.style.animation='fly-nx 0.65s cubic-bezier(.4,0,.2,1) forwards';
      });
    },2400);

    setTimeout(()=>{
      spawnSparks();
      titleBlock.classList.add('show');
      grid.style.opacity='0';
    },3100);
  }

  function spawnSparks(){
    const section=document.getElementById('link-nx');
    const sRect=section.getBoundingClientRect();
    const cx=sRect.width/2, cy=sRect.height/2;
    const colors=['#F6C90E','#4CAF7D','#4A90D9','#9B59B6','#fff','#c084fc'];
    for(let i=0;i<18;i++){
      const spark=document.createElement('div'); spark.className='spark';
      const angle=(i/18)*360, dist=40+Math.random()*60;
      spark.style.setProperty('--sx',Math.cos(angle*Math.PI/180)*dist+'px');
      spark.style.setProperty('--sy',Math.sin(angle*Math.PI/180)*dist+'px');
      spark.style.left=cx+'px';spark.style.top=cy+'px';
      spark.style.background=colors[i%colors.length];
      spark.style.animationDelay=(Math.random()*0.2)+'s';
      section.appendChild(spark);
      setTimeout(()=>spark.remove(),1000);
    }
  }

  window.addEventListener('load',()=>setTimeout(runNexosAnimation,300));
</script>
</body>
</html>
